<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识管理系统 V1.0 - Web UI Demo</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🧠</div>
        <div>
          <h1>知识管理系统</h1>
          <span class="version">V1.0 Demo</span>
        </div>
      </div>
      <nav class="nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <span class="icon">📊</span> 概览
        </a>
        <a href="#brain" class="nav-item" data-page="brain">
          <span class="icon">📚</span> 知识库浏览
        </a>
        <a href="#drafts" class="nav-item" data-page="drafts">
          <span class="icon">📝</span> 草稿审核
          <span class="badge" id="draft-badge">3</span>
        </a>
        <a href="#conflicts" class="nav-item" data-page="conflicts">
          <span class="icon">⚠️</span> 冲突处理
          <span class="badge" id="conflict-badge">2</span>
        </a>
        <a href="#graph" class="nav-item" data-page="graph">
          <span class="icon">🕸️</span> 图谱可视化
        </a>
        <a href="#verify" class="nav-item" data-page="verify">
          <span class="icon">🔍</span> 推理验证
        </a>
        <a href="#audit" class="nav-item" data-page="audit">
          <span class="icon">📋</span> 质量监控
        </a>
        <a href="#dashboardStats" class="nav-item" data-page="dashboardStats">
          <span class="icon">📈</span> 全局统计
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-item">
          <span class="status-dot online"></span> MCP 查询 8100
        </div>
        <div class="status-item">
          <span class="status-dot online"></span> MCP 写入 8101
        </div>
        <div class="status-item">
          <span class="status-dot offline"></span> REST API 3000
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="page-title">概览</h2>
        <div class="actions">
          <button class="btn btn-secondary" id="btn-import">导入源数据</button>
          <button class="btn btn-primary" id="btn-run-dream">运行 Dream Cycle</button>
        </div>
      </header>

      <div class="content" id="content">
        <!-- 页面内容动态切换 -->
      </div>
    </main>
  </div>

  <!-- 导入弹窗 -->
  <div class="modal" id="import-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>导入源数据</h3>
        <button class="close-btn" id="close-import">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>数据类型</label>
          <select id="import-type">
            <option value="prd">PRD / 流程图</option>
            <option value="code">业务代码</option>
            <option value="defect">JIRA 缺陷</option>
            <option value="report">自动化执行结果</option>
          </select>
        </div>
        <div class="form-group">
          <label>选择文件</label>
          <input type="file" id="import-file">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="import-note" rows="3" placeholder="可选：补充说明"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-import">取消</button>
        <button class="btn btn-primary" id="confirm-import">开始导入</button>
      </div>
    </div>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
